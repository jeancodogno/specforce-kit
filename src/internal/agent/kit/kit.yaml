defaults:
  agents:
    path: "agents"
    ext: ".md"
  skills:
    path: "skills"
    ext: ".md"

tools:
  gemini-cli:
    name: "Gemini CLI"
    description: "Google's Gemini CLI agent."
    target: ".gemini/"
    mappings:
      commands:
        - path: "commands/spf"
          ext: ".toml"
        - path: "skills/spf-*"
          name: "SKILL"
          ext: ".md"

  claude:
    name: "Claude"
    description: "Anthropic's Claude agent integration."
    target: ".claude/"
    mappings:
      commands:
        - path: "commands/spf"
          ext: ".md"
        - path: "skills/spf-*"
          name: "SKILL"
          ext: ".md"

  qwen:
    name: "Qwen"
    description: "Alibaba's Qwen agent integration."
    target: ".qwen/"
    mappings:
      commands:
        - path: "commands/spf"
          ext: ".md"
        - path: "skills/spf-*"
          name: "SKILL"
          ext: ".md"

  open-code:
    name: "OpenCode"
    description: "OpenCode agent integration."
    target: ".opencode/"
    mappings:
      commands:
        - path: "commands"
          ext: ".md"
        - path: "skills/spf-*"
          name: "SKILL"
          ext: ".md"

  kilo-code:
    name: "KiloCode"
    description: "KiloCode agent integration."
    target: ".kilocode/"
    mappings:
      commands:
        - path: "commands"
          ext: ".md"
        - path: "skills/spf-*"
          name: "SKILL"
          ext: ".md"

  codex:
    name: "Codex"
    description: "Codex agent integration."
    target: ".codex/"
    security:
      global_write: true
    mappings:
      commands:
        - target: "${CODEX_PROMPTS_DIR:-${CODEX_HOME:-~/.codex}/prompts}"
          path: "."
          name: "spf-*"
          ext: ".md"
        - path: "skills/spf-*"
          name: "SKILL"
          ext: ".md"

  antigravity:
    name: "Antigravity"
    description: "Antigravity workflow integration."
    target: ".agent/"
    mappings:
      commands:
        - path: "workflows"
          name: "spf-*"
          ext: ".md"
        - path: "skills/spf-*"
          name: "SKILL"
          ext: ".md"

  kimi-code:
    name: "Kimi Code"
    description: "Moonshot AI's Kimi Code CLI agent."
    target: ".kimi/"
    mappings:
      commands:
        path: "skills/spf-*"
        name: "SKILL"
        ext: ".md"
