  - **Coverage Gate:**
  - **Unit Testing Rules:** Critical paths MUST have automated tests.
  - **Regression Rules:** New behavior MUST include at least one verification test. Regressions MUST be captured with reproducible test cases.

  ## Delivery Standards & DoD
  - **Commit Standard:**
  - **Definition of Done (DoD):**
    - [ ] Code passes all linters and static analysis.
    - [ ] Tests are written and passing.
    - [ ] Observability/Logs are implemented for new features.

  ## AI Coding Constraints
  - The AI MUST NOT remove existing comments unless explicitly replacing them with better documentation.
  - All newly generated public methods/functions MUST include docblocks or strict type hinting.
  - [Add any other AI-specific safety rules]