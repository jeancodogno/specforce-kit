  ## Auditing & Logging
  - **Auditable Events:**
  - **Log Sanitization & PII:**
  
  ## AI Security Constraints
  - The AI MUST NEVER hardcode passwords, tokens, or API keys in the source code. All secrets MUST be mocked via environment variables.
  - The AI MUST ALWAYS use parameterized queries or the framework's native ORM/QueryBuilder. Raw SQL string concatenation is strictly forbidden.
  - The AI MUST strictly validate all API and Controller inputs using the framework's validator before any domain logic execution.