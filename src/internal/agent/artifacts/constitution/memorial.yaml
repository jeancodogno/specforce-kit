description: "Routing and Rules of Engagement for the Distributed Memorial."
instruction: |
  Generate the Memorial Routing document strictly using the provided template. This file acts as the primary entry point for AI agents to understand how project memory is structured.
  
  Adhere to the following rules:
  1. The section "> FOR AI AGENTS" is the most critical part of this file. It MUST be copied verbatim.
  2. Explain that the memorial is now distributed across individual fragment files in the same directory.

  CRITICAL: The final output must be pure Markdown, ready to be saved as `ROUTING.md`.
template: |
  # Project Memorial (Distributed)

  > **FOR AI AGENTS: RULES OF ENGAGEMENT**
  > This is your cross-session memory. You MUST obey these rules:
  > 1. **READ THIS CONTEXT FIRST** before starting any task in this repository.
  > 2. **TRIAGE:** Read the most recent fragments in this directory (`.specforce/memorial/*.md`) to understand recent changes, architectural precedents, and active lessons.
  > 3. **STRICT LIMITS:** The CLI will provide a consolidated view of the most relevant fragments. Do not attempt to read every single file unless specifically searching for a pattern.
  > 4. **DISTILLATION:** If a lesson or decision becomes a permanent rule, it MUST be moved to the official Constitution files (`engineering.md`, `architecture.md`, etc.) and the corresponding fragment should be marked as distilled or archived.

  ---

  ## Memorial Structure
  This directory contains individual memory fragments stored as timestamped Markdown files. Each fragment follows a strict schema:
  - **Action:** Records what was implemented in a specific feature.
  - **Lesson:** Records a recurring pattern, bug fix, or anti-pattern discovery.
  - **Decision:** Records a critical architectural choice and its rationale.

  Use these fragments to maintain technical continuity across sessions.
