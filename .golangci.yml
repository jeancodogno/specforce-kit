# Arquivo: .golangci.yml
version: 2

run:
  concurrency: 4
  timeout: 5m
  issues-exit-code: 1
  tests: true

linters:
  enable:
    - gocyclo
    - gocognit
    - funlen
    - dupl

linters-settings:
  gocyclo:
    min-complexity: 35
  gocognit:
    min-complexity: 35
  funlen:
    lines: 120
    statements: 60